<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード再設定 - CHUNIFORCE Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="figs/favicon.png" />
  <style>
    .auth-wrap {
      min-height: calc(100vh - 180px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.4rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.8rem; line-height: 1.6; }
    .auth-field { margin-bottom: 1.1rem; }
    .auth-field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    .auth-field input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem;
      font-family: inherit; outline: none; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .auth-field input:focus { border-color: var(--accent2); }
    .auth-btn {
      width: 100%; padding: 0.85rem;
      background: var(--accent2); color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .auth-btn:hover { opacity: 0.88; }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-msg {
      margin-top: 0.9rem; padding: 0.7rem 0.9rem;
      border-radius: 8px; font-size: 0.88rem;
      background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3);
      color: var(--error); display: none;
      line-height: 1.5;
    }
    .auth-msg.success {
      background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.3);
      color: var(--accent3); display: block;
    }
    .auth-msg.error { display: block; }
    .auth-links { margin-top: 1.4rem; text-align: center; font-size: 0.85rem; }
    .auth-links a { color: var(--accent2); text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }

    .password-wrapper { position: relative; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--accent2); }
  </style>
</head>
<body>
  <nav class="global-nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="./" class="nav-logo">
          <span class="logo-chuni">CHUNI</span><span class="logo-force">FORCE</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card" id="new-password-card">
      <div class="auth-title">新しいパスワードの設定</div>
      <div class="auth-subtitle">新しいパスワードを入力してください（8文字以上）。</div>

      <form id="new-password-form">
        <div class="auth-field">
          <label for="password">新しいパスワード</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required minlength="8" placeholder="8文字以上" />
            <button type="button" id="toggle-password" class="password-toggle" aria-label="パスワードを表示する">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div class="auth-field">
          <label for="password-confirm">新しいパスワード（確認）</label>
          <input type="password" id="password-confirm" name="password-confirm" required minlength="8" placeholder="もう一度入力" />
        </div>
        <button type="submit" id="submit-btn" class="auth-btn">パスワードを更新</button>
      </form>

      <div id="auth-msg" class="auth-msg"></div>

      <div class="auth-links">
        <a href="login.html">ログイン画面に戻る</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>CHUNIFORCE Calculator &copy; 2026</p>
  </footer>

  <script type="module">
    import { resetPassword } from './js/auth.js';
    const form = document.getElementById('new-password-form');
    const btn = document.getElementById('submit-btn');
    const msgEl = document.getElementById('auth-msg');
    const pwInput = document.getElementById('password');
    const pwConfirmInput = document.getElementById('password-confirm');
    const toggleBtn = document.getElementById('toggle-password');

    // トークン取得
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function showMsg(text, isError = true) {
      msgEl.innerHTML = text;
      msgEl.className = 'auth-msg ' + (isError ? 'error' : 'success');
      msgEl.style.display = 'block';
    }

    if (!token) {
      showMsg('トークンが無効または存在しません。再度再設定メールをリクエストしてください。');
      form.style.display = 'none';
      document.querySelector('.auth-subtitle').style.display = 'none';
    }

    if (toggleBtn && pwInput) {
      toggleBtn.addEventListener('click', () => {
        const isPw = pwInput.type === 'password';
        pwInput.type = isPw ? 'text' : 'password';
        pwConfirmInput.type = isPw ? 'text' : 'password';
        toggleBtn.innerHTML = isPw 
          ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = pwInput.value;
      const confirm = pwConfirmInput.value;

      if (newPassword !== confirm) {
        showMsg('パスワードが一致しません');
        return;
      }
      if (newPassword.length < 8) {
        showMsg('パスワードは8文字以上にしてください');
        return;
      }

      btn.disabled = true;
      btn.textContent = '更新中...';
      msgEl.style.display = 'none';

      try {
        const result = await resetPassword(token, newPassword);
        if (result.ok) {
          showMsg('パスワードを更新しました。ログイン画面に移動します...', false);
          form.style.display = 'none';
          document.querySelector('.auth-subtitle').style.display = 'none';
          setTimeout(() => { location.href = 'login.html'; }, 2000);
        } else {
          showMsg(result.error || '更新に失敗しました');
        }
      } catch (err) {
        showMsg('通信エラーが発生しました: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'パスワードを更新';
      }
    });
  </script>
</body>
</html>
