<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新規登録 - CHUNIFORCE Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="figs/favicon.png" />
  <style>
    .auth-wrap {
      min-height: calc(100vh - 180px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--surface1); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.4rem 2rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .auth-title {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.8rem; }
    .auth-field { margin-bottom: 1.1rem; }
    .auth-field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    .auth-field .field-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
    .auth-field input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem;
      font-family: inherit; outline: none; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .auth-field input:focus { border-color: var(--accent2); }
    .auth-btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit;
      margin-top: 0.5rem; transition: opacity 0.2s, transform 0.1s;
    }
    .auth-btn:hover { opacity: 0.88; }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-msg {
      margin-top: 0.9rem; padding: 0.7rem 0.9rem; border-radius: 8px;
      font-size: 0.88rem;
      background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3);
      color: var(--error); display: none;
    }
    .auth-msg.success {
      background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.3);
      color: var(--accent3); display: block;
    }
    .auth-msg.error { display: block; }
    .auth-links { margin-top: 1.4rem; text-align: center; font-size: 0.85rem; }
    .auth-links a { color: var(--accent2); text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    .auth-sep { color: var(--text-muted); margin: 0 0.5rem; }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--surface2); margin-top: 6px; overflow: hidden; }
    .strength-bar-inner { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }

    .password-wrapper { position: relative; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s; z-index: 2;
    }
    .password-toggle:hover { color: var(--accent2); }
  </style>
</head>
<body>
  <!-- ===== グローバルナビゲーション ===== -->
  <nav class="global-nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="./" class="nav-logo">
          <span class="logo-chuni">CHUNI</span><span class="logo-force">FORCE</span>
        </a>
        <a href="calculator.html" class="nav-item m-hide">計算機</a>
        <a href="ranking.html" class="nav-item m-hide">ランキング</a>
        <span id="nav-mypage-link-container"></span>
        
        <div class="dropdown-container">
          <button class="nav-item dropdown-btn">
            ヘルプ 
            <span class="nav-icon-span">
              <svg class="dropdown-icon" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
          <div class="dropdown-menu">
            <button class="dropdown-link" data-target="modal-about">CHUNIFORCEとは？</button>
            <a href="help/calc.html" class="dropdown-link">
              <span>計算方法</span>
              <svg class="link-icon" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1L5 5L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <a href="help/class.html" class="dropdown-link">
              <span>CLASSとエンブレム</span>
              <svg class="link-icon" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1L5 5L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <button class="dropdown-link" data-target="modal-how">使い方</button>
            <button class="dropdown-link" data-target="modal-qa">Q & A</button>
            <a href="help/term.html" class="dropdown-link">
              <span>利用規約</span>
              <svg class="link-icon" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1L5 5L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
      
      <div class="nav-right dropdown-right" id="nav-auth-area">
        <!-- JSで動的に書き換え -->
      </div>
    </div>
  </nav>

  <!-- 各種コンテンツ用モーダル -->
  <div id="content-modal" class="content-modal hidden" aria-hidden="true">
    <div class="content-modal-inner">
      <button id="content-modal-close" class="menu-close-btn">×</button>
      <div id="content-modal-body" class="content-modal-body"></div>
    </div>
  </div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">新規登録</div>
      <div class="auth-subtitle">chunirec のユーザーネームでアカウントを作成します</div>

      <form id="register-form" autocomplete="on">
        <div class="auth-field">
          <label for="username">chunirec ユーザーネーム</label>
          <input type="text" id="username" name="username" autocomplete="username"
            placeholder="k_chunithm" spellcheck="false" />
          <div class="field-note">chunirec に登録されているユーザーネームと一致する必要があります</div>
        </div>
        <div class="auth-field">
          <label for="password">パスワード</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" autocomplete="new-password"
              placeholder="8文字以上" />
            <button type="button" id="toggle-password" class="password-toggle" aria-label="パスワードを表示する">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <div class="strength-bar"><div id="strength-bar" class="strength-bar-inner"></div></div>
        </div>
        <div class="auth-field">
          <label for="confirm">パスワード（確認）</label>
          <div class="password-wrapper">
            <input type="password" id="confirm" name="confirm" autocomplete="new-password"
              placeholder="もう一度入力" />
            <button type="button" id="toggle-confirm" class="password-toggle" aria-label="パスワードを確認用に表示する">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <button type="submit" id="reg-btn" class="auth-btn">アカウントを作成</button>
      </form>

      <div id="auth-msg" class="auth-msg"></div>

      <div class="auth-links">
        既にアカウントをお持ちの方は
        <a id="link-login" href="login.html">ログイン</a>
        <span class="auth-sep">|</span>
        <a href="./">トップページ</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>CHUNIFORCE Calculator &copy; 2026 &nbsp;|&nbsp; Powered by <a href="https://chunirec.net" target="_blank" rel="noopener noreferrer">chunirec API</a> &amp; <a href="https://reiwa.f5.si" target="_blank" rel="noopener noreferrer">reiwa.f5.si</a></p>
    <p class="footer-note">本ツールは CHUNITHM 公式とは無関係のファンメイドツールです</p>
  </footer>

  <script type="module">
    import { register } from './js/auth.js';
    import { initNavbar } from './js/navbar.js';

    document.addEventListener('DOMContentLoaded', () => {
      initNavbar();
    });

    const params   = new URLSearchParams(location.search);
    const preUser  = params.get('username') || '';
    const linkLogin = document.getElementById('link-login');

    if (preUser) {
      document.getElementById('username').value = preUser;
      if (linkLogin) linkLogin.href = `login.html?next=${encodeURIComponent(preUser)}`;
    }

    // パスワード強度インジケーター
    const pwInput = document.getElementById('password');
    const bar     = document.getElementById('strength-bar');
    pwInput.addEventListener('input', () => {
      const len = pwInput.value.length;
      const pct = Math.min(len / 20, 1) * 100;
      bar.style.width = pct + '%';
      bar.style.background = len < 8 ? '#ff5050' : len < 12 ? '#ffab40' : '#00e5ff';
    });

    // パスワード表示切り替え関数
    function setupPasswordToggle(inputId, toggleId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(toggleId);
      if (!input || !btn) return;
      btn.addEventListener('click', () => {
        const isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        btn.innerHTML = isPw 
          ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      });
    }
    setupPasswordToggle('password', 'toggle-password');
    setupPasswordToggle('confirm', 'toggle-confirm');

    const form  = document.getElementById('register-form');
    const btn   = document.getElementById('reg-btn');
    const msgEl = document.getElementById('auth-msg');

    function showMsg(text, isError = true) {
      msgEl.textContent = text;
      msgEl.className   = 'auth-msg ' + (isError ? 'error' : 'success');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (!username || !password) { showMsg('すべての項目を入力してください'); return; }
      if (password.length < 8)    { showMsg('パスワードは8文字以上にしてください'); return; }
      if (password !== confirm)   { showMsg('パスワードが一致しません'); return; }

      btn.disabled    = true;
      btn.textContent = '登録中…';

      try {
        const result = await register(username, password);
        if (result.ok) {
          localStorage.setItem('cf_current_user', username);
          showMsg('登録が完了しました！ツールページへ移動します…', false);
          setTimeout(() => { location.href = `calculator.html`; }, 800);
        } else if (result.status === 409 || result.code === 'ALREADY_REGISTERED') {
          showMsg('このアカウントは既に登録されています。ログインしてください。');
          setTimeout(() => { location.href = `login.html`; }, 1500);
        } else if (result.status === 404) {
          showMsg('chunirec にそのユーザーが見つかりません。ユーザーネームを確認してください。');
        } else {
          showMsg(result.error || '登録に失敗しました');
        }
      } catch (err) {
        showMsg('通信エラー: ' + err.message);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'アカウントを作成';
      }
    });
  </script>
</body>
</html>
